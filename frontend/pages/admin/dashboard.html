<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Quản trị — ComicsWeb">
  <title>Quản trị — ComicsWeb</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../../css/style.css" rel="stylesheet">
</head>

<body>

  <main class="container py-4" id="admin-content">
    <h2 class="cw-section__title anim-fade-in">
      <i class="bi bi-speedometer2"></i> Bảng điều khiển
    </h2>

    <!-- Stats -->
    <div class="row mb-4" id="admin-stats">
      <div class="col-12 text-center py-3">
        <div class="spinner-border text-danger" role="status"></div>
      </div>
    </div>

    <!-- Comic List -->
    <h3
      style="font-family:var(--font-heading);color:var(--text-primary);border-left:4px solid var(--color-primary);padding-left:1rem;"
      class="mb-3">
      Quản lý truyện
    </h3>
    <div class="mb-3">
      <button class="btn btn-cw-primary btn-sm" onclick="window.location.href='addcomics.html'">
        <i class="bi bi-plus-lg"></i>
        Thêm truyện mới
      </button>
      <button class="btn btn-cw-primary btn-sm" onclick="window.location.href='accounts.html'">
        <i class="bi bi-people-fill"></i>
        Quản lý tài khoản
      </button>
    </div>
    <div class="table-responsive mb-5" id="admin-comic-list">
      <div class="text-center py-3">
        <div class="spinner-border text-danger" role="status"></div>
      </div>
    </div>

    <!-- Phê duyệt truyện -->
    <h3
      style="font-family:var(--font-heading);color:var(--text-primary);border-left:4px solid var(--color-primary);padding-left:1rem;"
      class="mb-3">
      Phê duyệt truyện thành viên đăng
    </h3>
    <div class="table-responsive" id="admin-pending-comic-list">
      <div class="text-center py-3">
        <div class="spinner-border text-danger" role="status"></div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/components.js"></script>
  <script src="../../js/admin.js"></script>
</body>

</html>
